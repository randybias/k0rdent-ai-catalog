apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vllm-direct
    app.kubernetes.io/instance: {{ .Values.deployment.name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: vllm-direct
    app.kubernetes.io/instance: {{ .Values.deployment.name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
