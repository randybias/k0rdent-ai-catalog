apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vllm-direct
    app.kubernetes.io/instance: {{ .Values.deployment.name }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    # Single-node, single-GPU-consumer — do NOT try maxSurge rolling updates,
    # they deadlock on GPU-exclusive scheduling. Recreate.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-direct
      app.kubernetes.io/instance: {{ .Values.deployment.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-direct
        app.kubernetes.io/instance: {{ .Values.deployment.name }}
    spec:
      restartPolicy: Always
      containers:
        - name: vllm
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          # Upstream vllm-openai's entrypoint is already `vllm serve`; we
          # supply the args.
          args:
            - --model
            - {{ printf "%s/%s" .Values.model.mountPath .Values.model.subdir }}
            - --served-model-name
            - {{ .Values.model.servedModelName | quote }}
            - --tensor-parallel-size
            - {{ .Values.vllm.tensorParallelSize | quote }}
            - --gpu-memory-utilization
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
            {{- if .Values.vllm.maxModelLen }}
            - --max-model-len
            - {{ .Values.vllm.maxModelLen | quote }}
            {{- end }}
            - --block-size
            - {{ .Values.vllm.blockSize | quote }}
            {{- if .Values.vllm.disablePrefixCaching }}
            - --no-enable-prefix-caching
            {{- end }}
            {{- if .Values.vllm.reasoningParser }}
            - --reasoning-parser
            - {{ .Values.vllm.reasoningParser | quote }}
            {{- end }}
            {{- if .Values.vllm.toolCallParser }}
            - --tool-call-parser
            - {{ .Values.vllm.toolCallParser | quote }}
            {{- end }}
            {{- if .Values.vllm.enableAutoToolChoice }}
            - --enable-auto-tool-choice
            {{- end }}
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.service.port | quote }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
              protocol: TCP
          env:
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: {{ .Values.model.mountPath }}
              readOnly: true
            {{- if .Values.compileCache.enabled }}
            - name: compile-cache
              mountPath: {{ .Values.compileCache.mountPath }}
            {{- end }}
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              nvidia.com/gpu: {{ .Values.vllm.tensorParallelSize | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              nvidia.com/gpu: {{ .Values.vllm.tensorParallelSize | quote }}
          readinessProbe:
            httpGet:
              path: /v1/models
              port: {{ .Values.service.port }}
            # Cold init (weights + cudagraphs) takes minutes; be generous.
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 120
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ .Values.model.pvcName }}
            readOnly: true
        {{- if .Values.compileCache.enabled }}
        - name: compile-cache
          persistentVolumeClaim:
            claimName: {{ .Values.deployment.name }}-compile-cache
        {{- end }}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
