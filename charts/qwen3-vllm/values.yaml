namespace: dynamo-system

deployment:
  name: qwen3-agg

# Dynamo runtime image that ships the vLLM backend.
# 1.1.0-dev.1 ships vLLM v0.17.1 (supports qwen3_5_moe). 1.0.0/1.0.1 on vLLM
# v0.16.0 do not and will fail with "model type qwen3_5_moe but Transformers
# does not recognize this architecture".
image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.0-dev.1

# --- Model source ---
model:
  # Path inside the container where weights are visible. Must match the
  # mountPath of the chosen volume below.
  mountPath: /models
  # Subdirectory under mountPath where Qwen3 lives.
  subdir: qwen3
  # Either "pvc" (CephFS) or "hostPath" (local disk fallback until fabric/Ceph is up).
  volumeType: pvc
  # Used when volumeType=pvc
  pvcName: qwen3-model-pvc
  # Used when volumeType=hostPath
  hostPath: /opt/models

# --- Serving config ---
vllm:
  tensorParallelSize: 8
  gpuMemoryUtilization: "0.90"
  maxModelLen: 32768
  blockSize: 64
  asyncScheduling: true
  disableLogRequests: true
  # Qwen3.6-MoE has mamba layers → needs hybrid KV cache. Dynamo disables it
  # by default which fails unification on these models.
  enableHybridKvCache: true

# Extra raw vLLM args passed through to `python -m dynamo.vllm`.
extraArgs: []

# --- IMEX channel injection for GPU pods ---
# libnvidia-container v1.18 doesn't auto-inject /dev/nvidia-caps-imex-channels
# yet. Until it does, we hostPath-mount the channel dir into the worker pod.
# Requires the nvidia-imex DaemonSet to have mknod'd the device on the host.
imex:
  hostPathInject: true
  hostPath: /dev/nvidia-caps-imex-channels
  # Informational; libnvidia-container ignores this value on our toolkit
  # version but it's harmless and forward-compatible.
  env: "0"

# Extra environment variables to set on the VllmDecodeWorker main container.
# Use this to tune vLLM / Dynamo runtime behavior without modifying the chart.
# Each entry is `{name, value}` and gets appended to the built-in env list.
extraEnv: []

replicas:
  frontend: 1
  worker: 1

resources:
  frontend:
    requests: { cpu: "4" }
    limits: { cpu: "8" }
  worker:
    # 8 GPUs, TP=8 → single worker claims all of them.
    gpu: "8"
