apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Values.namespace }}
spec:
  services:
    Frontend:
      componentType: frontend
      extraPodSpec:
        mainContainer:
          image: {{ .Values.image }}
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-reset-states
          env:
            # Dynamo frontend's dynamo_llm::hub tries to fetch model metadata
            # (config.json, tokenizer.json, chat template, …) from HuggingFace
            # using the worker's --model *path* as the HF repo id. For a local
            # path like /models/qwen3.6-35b that 404s, breaking /v1/models and
            # /v1/chat/completions. With HF_HUB_OFFLINE=1 + a pre-populated
            # HF-hub cache (seeded by the initContainer below), Dynamo uses the
            # cached files and skips the network call entirely.
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: HF_HOME
              value: /hf-cache
          volumeMounts:
            - name: hf-cache
              mountPath: /hf-cache
        initContainers:
          # Seed an HF-hub cache layout with the model metadata files from
          # CephFS. The cache folder name comes from hf-hub's folder_name():
          # every `/` in the model-id becomes `--`, so `/models/qwen3.6-35b`
          # ends up as `models----models--qwen3.6-35b`. We COPY (not symlink)
          # because the CephFS volume isn't mounted in the main container.
          - name: seed-hf-cache
            image: {{ .Values.image }}
            command:
              - bash
              - -euc
              - |
                set -x
                SRC="{{ printf "%s/%s" .Values.model.mountPath .Values.model.subdir }}"
                CACHE_ROOT=/hf-cache/hub
                # folder_name() transformation on the --model path
                REPO_NAME="$(echo "{{ printf "%s/%s" .Values.model.mountPath .Values.model.subdir }}" | sed 's|/|--|g')"
                REPO_DIR="$CACHE_ROOT/models--$REPO_NAME"
                SNAP="$REPO_DIR/snapshots/local"
                mkdir -p "$SNAP" "$REPO_DIR/refs"
                for f in config.json tokenizer.json tokenizer_config.json \
                         generation_config.json chat_template.jinja \
                         special_tokens_map.json merges.txt vocab.json \
                         preprocessor_config.json processor_config.json; do
                  if [ -f "$SRC/$f" ]; then
                    cp -a "$SRC/$f" "$SNAP/$f"
                    echo "copied $f"
                  fi
                done
                echo local > "$REPO_DIR/refs/main"
                ls -la "$SNAP"
            volumeMounts:
              - name: hf-cache
                mountPath: /hf-cache
              - name: models
                mountPath: {{ .Values.model.mountPath }}
                readOnly: true
        volumes:
          - name: hf-cache
            emptyDir: {}
          - name: models
            {{- if eq .Values.model.volumeType "pvc" }}
            persistentVolumeClaim:
              claimName: {{ .Values.model.pvcName }}
              readOnly: true
            {{- else }}
            hostPath:
              path: {{ .Values.model.hostPath }}
              type: Directory
            {{- end }}
      replicas: {{ .Values.replicas.frontend }}
      resources:
        requests:
          cpu: {{ .Values.resources.frontend.requests.cpu | quote }}
        limits:
          cpu: {{ .Values.resources.frontend.limits.cpu | quote }}

    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      # NOTE: we intentionally do NOT use the top-level `volumeMounts` field on
      # the service — that field is a shortcut that auto-creates a matching
      # volume from top-level `pvcs`, which clashes with anything we declare
      # under `extraPodSpec.volumes`. Declaring both sides under `extraPodSpec`
      # keeps volume/volumeMount pairing explicit and collision-free.
      extraPodSpec:
        mainContainer:
          image: {{ .Values.image }}
          workingDir: /workspace
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - {{ printf "%s/%s" .Values.model.mountPath .Values.model.subdir }}
            {{- if .Values.vllm.servedModelName }}
            - --served-model-name
            - {{ .Values.vllm.servedModelName | quote }}
            {{- end }}
            - --tensor-parallel-size
            - {{ .Values.vllm.tensorParallelSize | quote }}
            - --gpu-memory-utilization
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
            - --max-model-len
            - {{ .Values.vllm.maxModelLen | quote }}
            - --block-size
            - {{ .Values.vllm.blockSize | quote }}
            {{- if .Values.vllm.asyncScheduling }}
            - --async-scheduling
            {{- end }}
            {{- if .Values.vllm.disableLogRequests }}
            # vLLM 0.17+ renamed the flag; use the negated --enable-log-requests form.
            - --no-enable-log-requests
            {{- end }}
            {{- if .Values.vllm.enableHybridKvCache }}
            - --no-disable-hybrid-kv-cache-manager
            {{- end }}
            {{- if .Values.vllm.disablePrefixCaching }}
            - --no-enable-prefix-caching
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: DYN_HEALTH_CHECK_ENABLED
              value: "false"
            - name: NVIDIA_IMEX_CHANNELS
              value: {{ .Values.imex.env | quote }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: models
              mountPath: {{ .Values.model.mountPath }}
              readOnly: true
            {{- if .Values.imex.hostPathInject }}
            - name: imex-channels
              mountPath: /dev/nvidia-caps-imex-channels
            # fabric-imex-mgmt capability lives under /dev/nvidia-caps/;
            # CUDA requires it alongside the channel device for init.
            - name: nvidia-caps
              mountPath: /dev/nvidia-caps
            {{- end }}
        volumes:
          - name: models
            {{- if eq .Values.model.volumeType "pvc" }}
            persistentVolumeClaim:
              claimName: {{ .Values.model.pvcName }}
              readOnly: true
            {{- else }}
            hostPath:
              path: {{ .Values.model.hostPath }}
              type: Directory
            {{- end }}
          {{- if .Values.imex.hostPathInject }}
          - name: imex-channels
            hostPath:
              path: {{ .Values.imex.hostPath }}
              type: Directory
          - name: nvidia-caps
            hostPath:
              path: /dev/nvidia-caps
              type: Directory
          {{- end }}
      replicas: {{ .Values.replicas.worker }}
      resources:
        requests:
          gpu: {{ .Values.resources.worker.gpu | quote }}
        limits:
          gpu: {{ .Values.resources.worker.gpu | quote }}
