{{- if .Values.frontend.service.enabled }}
# The Dynamo operator creates a ClusterIP Service for the Frontend pod
# automatically, but we also want an externally-reachable endpoint on the
# node. This Service selects the same Frontend pods by the labels Dynamo's
# operator puts on them and exposes them as NodePort (or LoadBalancer).
#
# Keeping it in this chart means the endpoint is part of the reproducible
# k0rdent stack — no post-deploy kubectl patches required.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.deployment.name }}-frontend-external
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: dynamo-frontend-external
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    nvidia.com/dynamo-graph-deployment-name: {{ .Values.deployment.name }}
    nvidia.com/dynamo-component-type: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 8000
      protocol: TCP
      {{- if and (eq .Values.frontend.service.type "NodePort") .Values.frontend.service.nodePort }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
{{- end }}
