# How the probe reaches the inference endpoint.
#
# The probe builds $ENDPOINT from:
#   scheme://<host>:<port>
# where:
#   - host resolves to `endpoint.host` if non-empty; otherwise to the probe
#     pod's own nodeIP (injected via downward API status.hostIP).
#   - port is `endpoint.port`.
endpoint:
  host: ""
  port: 8000
  scheme: http

# Model name as it appears in /v1/models — must match what the worker
# registered (typically the --served-model-name value).
model: "Qwen/Qwen3.6-35B-A3B"

# Timeouts.
# - readinessSeconds: how long Phase 1 waits for /v1/models to list the model.
# - inferenceSeconds: overall wall-clock budget for Phase 2 + Phase 3
#   requests each. Cold-start on large models can be several minutes
#   (first-request cudagraph capture).
# - firstChunkSeconds: Phase 3 gates on receiving the first SSE `data:`
#   event within this window after the request is accepted.
timeouts:
  readinessSeconds: 600
  inferenceSeconds: 900
  firstChunkSeconds: 600

# Probe image. curlimages/curl is minimal and ships a modern curl.
image: curlimages/curl:8.10.1

# Where the Job runs.
namespace: inference
