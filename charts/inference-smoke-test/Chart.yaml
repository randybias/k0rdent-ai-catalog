apiVersion: v2
name: inference-smoke-test
description: End-to-end functional smoke test for the inference stack. Runs a Kubernetes Job as a Helm post-install+post-upgrade hook that POSTs a minimal /v1/chat/completions and asserts HTTP 200 + non-empty completion. Helm blocks on hook completion, so the MCS (and by transitivity, the ClusterDeployment) is only Ready when the endpoint actually serves — not when pods are merely running. Renamed from stack-smoke-test.
type: application
version: 0.5.0
appVersion: "1.0.0"
keywords:
  - smoke-test
  - inference
  - helm-hook
