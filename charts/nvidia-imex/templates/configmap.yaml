apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  nodes_config.cfg: |
    {{- .Values.nodesConfig | nindent 4 }}
  config.cfg: |
    DAEMONIZE=0
    LOG_LEVEL=4
    LOG_FILE_NAME=
    STATS_FILE_NAME=
    IMEX_NODE_CONFIG_FILE=/etc/nvidia-imex/nodes_config.cfg
    SERVER_PORT=50000
    IMEX_CMD_PORT=50005
