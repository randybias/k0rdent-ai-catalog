apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: nvidia-imex
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-imex
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-imex
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      hostPID: true
      hostIPC: true
      hostNetwork: true
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: nvidia-imex
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              if ! command -v nvidia-imex >/dev/null 2>&1; then
                echo "Installing nvidia-imex-{{ .Values.driverMajor }}..."
                apt-get update -qq
                apt-get install -y --no-install-recommends "nvidia-imex-{{ .Values.driverMajor }}"
              fi
              mkdir -p /etc/nvidia-imex
              cp /config/nodes_config.cfg /etc/nvidia-imex/nodes_config.cfg
              cp /config/config.cfg       /etc/nvidia-imex/config.cfg
              echo "Starting nvidia-imex..."
              exec nvidia-imex -c /etc/nvidia-imex/config.cfg
          volumeMounts:
            - name: config
              mountPath: /config
            - name: dev
              mountPath: /dev
            - name: run-nvidia
              mountPath: /run/nvidia
              mountPropagation: HostToContainer
            - name: varlog
              mountPath: /var/log
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        - name: dev
          hostPath:
            path: /dev
        - name: run-nvidia
          hostPath:
            path: /run/nvidia
        - name: varlog
          hostPath:
            path: /var/log
