apiVersion: v2
name: nvidia-imex
description: NVIDIA IMEX (Inter-node Memory eXchange) daemon DaemonSet + kernel-module-config ConfigMap for Blackwell (B200/B300) nodes. Required for CUDA context initialization on HGX Blackwell even on single-node deployments. The ConfigMap is consumed by the GPU Operator driver container to load the nvidia kernel module with NVreg_CreateImexChannel0=1.
type: application
version: 0.2.0
appVersion: "580.105.08"
