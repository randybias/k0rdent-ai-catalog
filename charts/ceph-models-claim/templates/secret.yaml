# Credentials consumed by the ceph-csi-cephfs driver for mount-time auth.
# Key name mapping ('userID'/'userKey') is mandated by the CSI driver.
{{- if not .Values.ceph.userKey }}
{{- fail "ceph.userKey must be provided (inject via ServiceTemplate values — never commit to the public chart)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: ceph-models-credentials
  namespace: {{ .Values.claim.namespace }}
type: Opaque
stringData:
  userID: {{ .Values.ceph.userID | quote }}
  userKey: {{ .Values.ceph.userKey | quote }}
