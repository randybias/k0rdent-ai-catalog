# Credentials consumed by the ceph-csi-cephfs driver for mount-time auth.
# Key name mapping ('userID'/'userKey') is mandated by the CSI driver.
#
# If ceph.existingSecret is set, this chart does NOT create the Secret — we
# assume the user has created it out-of-band (e.g. decrypted from an age
# store and kubectl-applied). That keeps the plaintext key out of Helm
# values, ServiceTemplate manifests, and any git history.
{{- if not .Values.ceph.existingSecret }}
  {{- if not .Values.ceph.userKey }}
    {{- fail "Either ceph.existingSecret (name of a pre-created Secret) or ceph.userKey (plaintext) must be provided" }}
  {{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: ceph-models-credentials
  namespace: {{ .Values.claim.namespace }}
type: Opaque
stringData:
  userID: {{ .Values.ceph.userID | quote }}
  userKey: {{ .Values.ceph.userKey | quote }}
{{- end }}
